<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Dataset Importer</title>
    <link href="{{url_for('static',filename='bootstrap/css/bootstrap.min.css')}}" rel="stylesheet">
    <link href="{{url_for('static',filename='bootstrap/css/bootstrap-icons.min.css')}}" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static',filename='css/import.css')}}">
</head>
<body>
    <div class="import-container">
        <div class="header-section">
            <div class="icon-circle">
                <i class="bi bi-file-earmark-spreadsheet"></i>
            </div>
            <h1>Import Dataset</h1>
            <p>Upload a CSV file to get started</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="uploadForm">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <i class="bi bi-cloud-arrow-up"></i>
                </div>
                <div class="upload-text">Drag and drop your CSV file here</div>
                <div class="upload-subtext">or click to select from your computer</div>
                <input type="file" id="fileInput" accept=".csv,.txt,.xml ,.xlsm"/>
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-icon">
                    <i class="bi bi-file-text"></i>
                </div>
                <div class="file-details">
                    <div class="file-name" id="fileName"></div>
                    <div class="file-size" id="fileSize"></div>
                </div>
                <div class="file-actions">
                    <button type="button" class="btn btn-outline-secondary btn-sm-icon" id="clearFileBtn" title="Remove file">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="loading-text" id="loadingText">
                        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        Processing...
                    </span>
                    <span id="submitText">Import Dataset</span>
                </button>
                <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="window.history.back()">
                    Cancel
                </button>
            </div>
        </form>
    </div>

    <script src="{{url_for('static',filename='/js/import.js')}}"></script>
